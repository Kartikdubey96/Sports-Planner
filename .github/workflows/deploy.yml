name: Sports Assistant CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/sports-planner:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/sports-planner:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user 
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Login to Docker Hub
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          # 2. Pull the fresh image
          docker pull ${{ secrets.DOCKER_USERNAME }}/sports-planner:latest

          # 3. Stop and remove old container
          docker stop sports-container || true
          docker rm sports-container || true

          # 4. Run new container (UPDATED FOR GENAI PROJECT)
          docker run -d \
            --name sports-container \
            -p 8501:8501 \
            -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            -e SERPER_API_KEY="${{ secrets.SERPER_API_KEY }}" \
            -e RAPID_API_KEY="${{ secrets.RAPID_API_KEY }}" \
            -v /home/ec2-user/sports_vault_db:/app/sports_vault_db \
            ${{ secrets.DOCKER_USERNAME }}/sports-planner:latest
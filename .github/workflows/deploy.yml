name: Sports Assistant CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      # I renamed the image to 'sports-planner' to match your project
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sports-planner .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/sports-planner

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Pull the fresh image
          docker pull ${{ secrets.DOCKER_USERNAME }}/sports-planner
          
          # Stop and remove the old container if it exists
          docker stop sports-container || true
          docker rm sports-container || true
          
          # Run the new container
          # CRITICAL: We pass your API Keys as Environment Variables here
          docker run -d \
            --name sports-container \
            -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            -e SERPER_API_KEY=${{ secrets.SERPER_API_KEY }} \
            ${{ secrets.DOCKER_USERNAME }}/sports-planner
name: Sports Assistant CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/sports-planner:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/sports-planner:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user  # <--- UPDATED FROM ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Log in to Docker Hub on the EC2 (Optional but safer)
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          # 1. Pull the fresh image from Docker Hub
          docker pull ${{ secrets.DOCKER_USERNAME }}/sports-planner:latest
          
          # 2. Stop and remove the old container if it exists
          docker stop sports-container || true
          docker rm sports-container || true
          
          # 3. Run the new container
          docker run -d \
            --name sports-container \
            -p 8501:8501 \
            -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            -e SERPER_API_KEY=${{ secrets.SERPER_API_KEY }} \
            ${{ secrets.DOCKER_USERNAME }}/sports-planner:latest
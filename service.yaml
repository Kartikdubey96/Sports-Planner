apiVersion: v1
kind: Service
metadata:
  name: sports-analyst-service
spec:
  type: LoadBalancer # Asks the cloud provider for a public IP
  selector:
    app: sports-analyst # Connects this service to your deployment
  ports:
    - protocol: TCP
      port: 80        # The port users will hit on the internet
      targetPort: 8501 # The internal Streamlit port K8s routes traffic to